---
env: dev

# Hub endpoints
hub_monitoring_ip: "10.58.29.83"
hub_jaeger_endpoint: "{{ hub_monitoring_ip }}:4317"

# Helm
helm_timeout: "10m"

# Components
node_exporter_enabled: true
kube_state_metrics_enabled: true
otel_collector_enabled: true

# OTEL Collector
otel_collector_namespace: monitoring
otel_collector_release_name: otel-collector
otel_collector_version: "0.88.0"
