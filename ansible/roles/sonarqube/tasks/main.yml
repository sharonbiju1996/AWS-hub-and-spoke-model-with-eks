---
# ========================================
# PostgreSQL Installation
# ========================================
- name: Install PostgreSQL
  apt:
    name:
      - postgresql
      - postgresql-contrib
      - python3-psycopg2
    state: present
    update_cache: yes

- name: Start PostgreSQL
  systemd:
    name: postgresql
    state: started
    enabled: yes

- name: Configure pg_hba.conf for md5 authentication
  copy:
    content: |
      local   all             postgres                                peer
      local   all             all                                     md5
      host    all             all             127.0.0.1/32            md5
      host    all             all             ::1/128                 md5
    dest: /etc/postgresql/14/main/pg_hba.conf
    owner: postgres
    group: postgres
    mode: '0640'
  notify: restart postgresql

- name: Restart PostgreSQL to apply pg_hba changes
  systemd:
    name: postgresql
    state: restarted

- name: Create SonarQube database user
  shell: |
    sudo -u postgres psql -c "DO \$\$
    BEGIN
      IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname = '{{ sonarqube_db_user }}') THEN
        CREATE USER {{ sonarqube_db_user }} WITH ENCRYPTED PASSWORD '{{ sonarqube_db_password }}';
      ELSE
        ALTER USER {{ sonarqube_db_user }} WITH ENCRYPTED PASSWORD '{{ sonarqube_db_password }}';
      END IF;
    END
    \$\$;"
  args:
    executable: /bin/bash

- name: Create SonarQube database
  shell: |
    sudo -u postgres psql -c "SELECT 1 FROM pg_database WHERE datname = '{{ sonarqube_db_name }}'" | grep -q 1 || \
    sudo -u postgres psql -c "CREATE DATABASE {{ sonarqube_db_name }} OWNER {{ sonarqube_db_user }};"
  args:
    executable: /bin/bash

- name: Grant privileges
  shell: |
    sudo -u postgres psql -c "GRANT ALL PRIVILEGES ON DATABASE {{ sonarqube_db_name }} TO {{ sonarqube_db_user }};"
  args:
    executable: /bin/bash

# ========================================
# Java Installation
# ========================================
- name: Install Java
  apt:
    name: "openjdk-{{ sonarqube_java_version }}-jdk"
    state: present

# ========================================
# SonarQube User/Group
# ========================================
- name: Create sonarqube group
  group:
    name: "{{ sonarqube_group }}"
    system: yes

- name: Create sonarqube user
  user:
    name: "{{ sonarqube_user }}"
    group: "{{ sonarqube_group }}"
    system: yes
    shell: /bin/bash

# ========================================
# System Settings
# ========================================
- name: Set kernel parameters
  sysctl:
    name: "{{ item.key }}"
    value: "{{ item.value }}"
    state: present
    reload: yes
  loop:
    - { key: 'vm.max_map_count', value: '524288' }
    - { key: 'fs.file-max', value: '131072' }

- name: Set limits for sonarqube
  pam_limits:
    domain: "{{ sonarqube_user }}"
    limit_type: "{{ item.type }}"
    limit_item: "{{ item.item }}"
    value: "{{ item.value }}"
  loop:
    - { type: 'soft', item: 'nofile', value: '131072' }
    - { type: 'hard', item: 'nofile', value: '131072' }
    - { type: 'soft', item: 'nproc', value: '8192' }
    - { type: 'hard', item: 'nproc', value: '8192' }

# ========================================
# SonarQube Installation
# ========================================
- name: Check if sonarqube exists
  stat:
    path: "{{ sonarqube_home }}/bin"
  register: sonarqube_dir

- name: Download SonarQube
  get_url:
    url: "https://binaries.sonarsource.com/Distribution/sonarqube/sonarqube-{{ sonarqube_version }}.zip"
    dest: /tmp/sonarqube.zip
  when: not sonarqube_dir.stat.exists

- name: Install unzip
  apt:
    name: unzip
    state: present

- name: Extract SonarQube
  unarchive:
    src: /tmp/sonarqube.zip
    dest: /opt
    remote_src: yes
    owner: "{{ sonarqube_user }}"
    group: "{{ sonarqube_group }}"
  when: not sonarqube_dir.stat.exists

- name: Create symlink
  file:
    src: "/opt/sonarqube-{{ sonarqube_version }}"
    dest: "{{ sonarqube_home }}"
    state: link
    force: yes

- name: Set ownership
  file:
    path: "/opt/sonarqube-{{ sonarqube_version }}"
    owner: "{{ sonarqube_user }}"
    group: "{{ sonarqube_group }}"
    recurse: yes

# ========================================
# SonarQube Configuration
# ========================================
- name: Deploy config
  template:
    src: sonar.properties.j2
    dest: "{{ sonarqube_home }}/conf/sonar.properties"
    owner: "{{ sonarqube_user }}"
    group: "{{ sonarqube_group }}"
  notify: restart sonarqube

- name: Deploy systemd service
  template:
    src: sonarqube.service.j2
    dest: /etc/systemd/system/sonarqube.service
  notify:
    - reload systemd
    - restart sonarqube

- name: Start SonarQube
  systemd:
    name: sonarqube
    enabled: yes
    state: started
    daemon_reload: yes

- name: Wait for SonarQube
  wait_for:
    port: "{{ sonarqube_web_port }}"
    delay: 30
    timeout: 300
  ignore_errors: yes

- name: Cleanup
  file:
    path: /tmp/sonarqube.zip
    state: absent
